apiVersion: v1
kind: Namespace
metadata:
  name: car-website-space
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: car-website-space
  name: carwebsite-deployment
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: carwebsite-app
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carwebsite-app
    spec:
      containers:
      - name: carwebsite-container
        image: gurramrahul/car-website:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  namespace: car-website-space
  name: carwebsite-service
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: carwebsite-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: car-website-space
  name: carwebsite-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: carwebsite-service
              port:
                number: 80

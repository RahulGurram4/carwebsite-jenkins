apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-website
  template:
    metadata:
      labels:
        app: car-website
    spec:
      containers:
      - name: car-website
        image: 787309524539.dkr.ecr.ap-southeast-2.amazonaws.com/car-website:latest
        ports:
        - containerPort: 80